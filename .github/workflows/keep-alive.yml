name: Keep HF Space Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        run: |
          echo "Pinging HF Space..."
          curl -X GET "https://YOUR_USERNAME-justicebot.hf.space/api/health" \
            -H "User-Agent: JusticeBot-KeepAlive/1.0" \
            --max-time 30 || echo "Ping attempt completed"
          echo "Keep-alive check done"
